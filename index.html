<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  select { color-scheme: dark; }
  input::placeholder, textarea::placeholder { color: #334155; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SECTORS = [
  "Administração","RH / Departamento Pessoal","Financeiro","Contabilidade",
  "TI / Tecnologia","Operações","Manutenção","Almoxarifado","Compras",
  "Jurídico","Diretoria","Atendimento / SAC","Controle de Frota",
  "Segurança / CCTV","Outro",
];

const EQUIPMENT_TYPES = ["Desktop","Notebook","Monitor","Impressora","Scanner","Outros"];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function compressImage(dataUrl, maxWidth = 800) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(maxWidth / img.width, maxWidth / img.height);
      canvas.width = img.width * (ratio < 1 ? ratio : 1);
      canvas.height = img.height * (ratio < 1 ? ratio : 1);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.6));
    };
    img.src = dataUrl;
  });
}

// --- IndexedDB HELPERS ---
const DB_NAME = "equip-mapper";
const DB_VERSION = 1;
const STORE_NAME = "records";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadRecords() {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => {
        const sorted = req.result.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        resolve(sorted);
      };
      req.onerror = () => reject(req.error);
    });
  } catch {
    return [];
  }
}

async function saveRecord(record) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.put(record);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function deleteRecord(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// --- COMPONENTS ---

function Header({ count, onExport, view, setView }) {
  return (
    <div style={{
      background: "linear-gradient(135deg, #0b1a2e 0%, #163a5f 100%)",
      padding: "20px 16px 16px", color: "#fff",
      position: "sticky", top: 0, zIndex: 100,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{
          width: 36, height: 36, borderRadius: 8,
          background: "#f59e0b", display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 18, fontWeight: 800, color: "#0b1a2e", fontFamily: "'DM Sans', sans-serif",
        }}>P</div>
        <div>
          <div style={{
            fontFamily: "'DM Sans', sans-serif", fontWeight: 700,
            fontSize: 16, letterSpacing: "-0.02em",
          }}>Mapeamento de Equipamentos</div>
          <div style={{
            fontFamily: "'IBM Plex Mono', monospace", fontSize: 11,
            color: "#94a3b8", letterSpacing: "0.05em",
          }}>VIAÇÃO PIONEIRA · {count} registro{count !== 1 ? "s" : ""}</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <TabBtn active={view === "form"} onClick={() => setView("form")}>+ Novo</TabBtn>
        <TabBtn active={view === "list"} onClick={() => setView("list")}>Registros</TabBtn>
        {count > 0 && (
          <button onClick={onExport} style={{
            marginLeft: "auto", background: "rgba(245,158,11,0.15)",
            border: "1px solid rgba(245,158,11,0.3)", borderRadius: 8,
            color: "#f59e0b", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace",
            padding: "6px 12px", cursor: "pointer",
          }}>Exportar</button>
        )}
      </div>
    </div>
  );
}

function TabBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: "7px 16px", borderRadius: 8, border: "none",
      background: active ? "#f59e0b" : "rgba(255,255,255,0.08)",
      color: active ? "#0b1a2e" : "#94a3b8",
      fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
      fontSize: 13, cursor: "pointer", transition: "all .2s",
    }}>{children}</button>
  );
}

function PhotoCapture({ photo, setPhoto }) {
  const fileRef = useRef(null);
  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const compressed = await compressImage(ev.target.result);
      setPhoto(compressed);
    };
    reader.readAsDataURL(file);
  };
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={labelStyle}>Foto do Equipamento *</label>
      <input ref={fileRef} type="file" accept="image/*" capture="environment"
        onChange={handleFile} style={{ display: "none" }} />
      {photo ? (
        <div style={{ position: "relative" }}>
          <img src={photo} alt="preview" style={{
            width: "100%", maxHeight: 220, objectFit: "cover",
            borderRadius: 12, border: "2px solid #1e3a5f",
          }} />
          <button onClick={() => { setPhoto(null); fileRef.current.value = ""; }} style={{
            position: "absolute", top: 8, right: 8,
            background: "rgba(0,0,0,0.65)", color: "#fff",
            border: "none", borderRadius: "50%", width: 30, height: 30,
            fontSize: 16, cursor: "pointer", display: "flex",
            alignItems: "center", justifyContent: "center",
          }}>✕</button>
        </div>
      ) : (
        <button onClick={() => fileRef.current?.click()} style={{
          width: "100%", padding: "32px 16px", borderRadius: 12,
          border: "2px dashed #2a4a6b", background: "rgba(245,158,11,0.04)",
          color: "#94a3b8", cursor: "pointer", display: "flex",
          flexDirection: "column", alignItems: "center", gap: 8,
        }}>
          <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#f59e0b" strokeWidth="1.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" />
          </svg>
          <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600 }}>
            Tirar Foto / Selecionar
          </span>
          <span style={{ fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>
            Toque para abrir a câmera
          </span>
        </button>
      )}
    </div>
  );
}

function SelectField({ label, value, onChange, options, required }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>{label}{required && " *"}</label>
      <select value={value} onChange={(e) => onChange(e.target.value)} style={inputStyle}>
        <option value="">Selecione...</option>
        {options.map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function TextField({ label, value, onChange, placeholder, required }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>{label}{required && " *"}</label>
      <input type="text" value={value} onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder} style={inputStyle} />
    </div>
  );
}

function TextArea({ label, value, onChange, placeholder }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={labelStyle}>{label}</label>
      <textarea value={value} onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder} rows={2}
        style={{ ...inputStyle, resize: "vertical", minHeight: 56 }} />
    </div>
  );
}

function RecordCard({ rec, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div style={{
      background: "#0f2440", borderRadius: 14,
      border: "1px solid #1e3a5f", overflow: "hidden",
      marginBottom: 12, transition: "all .2s",
    }}>
      <div onClick={() => setExpanded(!expanded)} style={{
        display: "flex", gap: 12, padding: 12, cursor: "pointer", alignItems: "center",
      }}>
        {rec.photo ? (
          <img src={rec.photo} alt="" style={{
            width: 56, height: 56, objectFit: "cover", borderRadius: 8, flexShrink: 0,
          }} />
        ) : (
          <div style={{
            width: 56, height: 56, borderRadius: 8, background: "#1e3a5f",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0, color: "#475569", fontSize: 22,
          }}>?</div>
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 14, color: "#e2e8f0",
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}>{rec.name || rec.type}</div>
          <div style={{
            fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#64748b", marginTop: 2,
          }}>{rec.sector}</div>
          <div style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#f59e0b", marginTop: 2,
          }}>{rec.employee || "Sem colaborador"}</div>
        </div>
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"
          stroke="#475569" strokeWidth="2"
          style={{ transform: expanded ? "rotate(180deg)" : "none", transition: "transform .2s", flexShrink: 0 }}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
      {expanded && (
        <div style={{ padding: "0 12px 12px", borderTop: "1px solid #1e3a5f" }}>
          {rec.photo && (
            <img src={rec.photo} alt="" style={{
              width: "100%", maxHeight: 260, objectFit: "contain",
              borderRadius: 8, marginTop: 12, background: "#060f1d",
            }} />
          )}
          <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <InfoChip label="Tipo" value={rec.type} />
            <InfoChip label="Setor" value={rec.sector} />
            <InfoChip label="Colaborador" value={rec.employee || "—"} />
            <InfoChip label="Data" value={new Date(rec.createdAt).toLocaleDateString("pt-BR")} />
            {rec.ip && (
              <InfoChip label="IP" value={rec.ip} />
            )}
            {rec.monitorCount > 0 && (
              <InfoChip label="Monitores" value={`${rec.monitorCount}x`} />
            )}
            {rec.monitorSizes?.length > 0 && (
              <InfoChip label="Polegadas" value={rec.monitorSizes.join(", ")} />
            )}
            {rec.keyboardBrand && (
              <InfoChip label="Teclado" value={`${rec.keyboardBrand}${rec.keyboardType ? " · " + rec.keyboardType : ""}`} />
            )}
            {rec.mouseBrand && (
              <InfoChip label="Mouse" value={`${rec.mouseBrand}${rec.mouseType ? " · " + rec.mouseType : ""}`} />
            )}
          </div>
          {rec.obs && (
            <div style={{
              marginTop: 8, padding: "8px 10px", borderRadius: 8,
              background: "#0a1929", fontSize: 12, color: "#94a3b8",
              fontFamily: "'DM Sans', sans-serif",
            }}>
              <span style={{ fontWeight: 600, color: "#64748b" }}>Obs: </span>{rec.obs}
            </div>
          )}
          <button onClick={() => onDelete(rec.id)} style={{
            marginTop: 10, width: "100%", padding: "8px",
            borderRadius: 8, border: "1px solid #7f1d1d",
            background: "rgba(127,29,29,0.15)", color: "#fca5a5",
            fontFamily: "'DM Sans', sans-serif", fontSize: 13,
            fontWeight: 600, cursor: "pointer",
          }}>Excluir registro</button>
        </div>
      )}
    </div>
  );
}

function InfoChip({ label, value }) {
  return (
    <div style={{ background: "#0a1929", borderRadius: 8, padding: "6px 10px" }}>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 9,
        color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em",
      }}>{label}</div>
      <div style={{
        fontFamily: "'DM Sans', sans-serif", fontSize: 13,
        color: "#cbd5e1", fontWeight: 500, marginTop: 1,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>{value}</div>
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{
      position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
      background: "#166534", color: "#bbf7d0", padding: "10px 20px",
      borderRadius: 10, fontFamily: "'DM Sans', sans-serif",
      fontSize: 14, fontWeight: 600, zIndex: 999,
      boxShadow: "0 8px 30px rgba(0,0,0,0.4)", animation: "fadeIn .3s",
    }}>{msg}</div>
  );
}

// --- STYLES ---
const labelStyle = {
  display: "block", marginBottom: 5,
  fontFamily: "'IBM Plex Mono', monospace",
  fontSize: 11, color: "#64748b",
  textTransform: "uppercase", letterSpacing: "0.06em",
};

const inputStyle = {
  width: "100%", padding: "10px 12px", borderRadius: 10,
  border: "1.5px solid #1e3a5f", background: "#0a1929",
  color: "#e2e8f0", fontSize: 15, fontFamily: "'DM Sans', sans-serif",
  outline: "none", boxSizing: "border-box", WebkitAppearance: "none",
};

// --- MAIN APP ---
function App() {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("form");
  const [toast, setToast] = useState("");

  const [photo, setPhoto] = useState(null);
  const [type, setType] = useState("");
  const [name, setName] = useState("");
  const [sector, setSector] = useState("");
  const [employee, setEmployee] = useState("");
  const [obs, setObs] = useState("");
  const [monitorCount, setMonitorCount] = useState("");
  const [monitorSizes, setMonitorSizes] = useState([]);
  const [ip, setIp] = useState("");
  const [keyboardBrand, setKeyboardBrand] = useState("");
  const [keyboardType, setKeyboardType] = useState("");
  const [mouseBrand, setMouseBrand] = useState("");
  const [mouseType, setMouseType] = useState("");

  const [filterSector, setFilterSector] = useState("");
  const [search, setSearch] = useState("");

  useEffect(() => {
    loadRecords().then((r) => { setRecords(r); setLoading(false); });
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  const resetForm = () => {
    setPhoto(null); setType(""); setName("");
    setSector(""); setEmployee(""); setObs("");
    setMonitorCount(""); setMonitorSizes([]); setIp("");
    setKeyboardBrand(""); setKeyboardType("");
    setMouseBrand(""); setMouseType("");
  };

  const handleMonitorCount = (val) => {
    const n = parseInt(val) || 0;
    setMonitorCount(val);
    setMonitorSizes((prev) => {
      const arr = [...prev];
      while (arr.length < n) arr.push("");
      return arr.slice(0, n);
    });
  };

  const handleMonitorSize = (index, val) => {
    setMonitorSizes((prev) => {
      const arr = [...prev];
      arr[index] = val;
      return arr;
    });
  };

  const handleSave = async () => {
    if (!photo && !name) { showToast("Adicione uma foto ou nome!"); return; }
    if (!sector) { showToast("Selecione o setor!"); return; }
    const rec = {
      id: generateId(),
      photo, type: type || "Desktop", name, sector, employee, obs,
      monitorCount: (type === "Desktop" || type === "") ? (parseInt(monitorCount) || 0) : 0,
      monitorSizes: (type === "Desktop" || type === "") ? monitorSizes.filter(Boolean) : [],
      ip: (type === "Desktop" || type === "" || type === "Impressora") ? ip : "",
      keyboardBrand: (type === "Desktop" || type === "") ? keyboardBrand : "",
      keyboardType: (type === "Desktop" || type === "") ? keyboardType : "",
      mouseBrand: (type === "Desktop" || type === "") ? mouseBrand : "",
      mouseType: (type === "Desktop" || type === "") ? mouseType : "",
      createdAt: new Date().toISOString(),
    };
    await saveRecord(rec);
    const updated = await loadRecords();
    setRecords(updated);
    resetForm();
    showToast("Equipamento registrado!");
  };

  const handleDelete = async (id) => {
    await deleteRecord(id);
    const updated = await loadRecords();
    setRecords(updated);
    showToast("Registro excluído");
  };

  const handleExport = () => {
    const rows = records.map((r) => ({
      Data: new Date(r.createdAt).toLocaleDateString("pt-BR"),
      Tipo: r.type, Nome: r.name, Setor: r.sector,
      Colaborador: r.employee,
      IP: r.ip || "",
      Monitores: r.monitorCount || 0,
      Polegadas: r.monitorSizes?.join(", ") || "",
      Teclado_Marca: r.keyboardBrand || "",
      Teclado_Tipo: r.keyboardType || "",
      Mouse_Marca: r.mouseBrand || "",
      Mouse_Tipo: r.mouseType || "",
      Observação: r.obs,
      TemFoto: r.photo ? "Sim" : "Não",
    }));
    const headers = Object.keys(rows[0] || {});
    const csv = [
      headers.join(";"),
      ...rows.map((r) => headers.map((h) => `"${(r[h] || "").replace(/"/g, '""')}"`).join(";")),
    ].join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mapeamento_equipamentos_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("CSV exportado!");
  };

  const filtered = records.filter((r) => {
    if (filterSector && r.sector !== filterSector) return false;
    if (search) {
      const s = search.toLowerCase();
      return (r.name?.toLowerCase().includes(s) ||
        r.employee?.toLowerCase().includes(s) ||
        r.sector?.toLowerCase().includes(s));
    }
    return true;
  });

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh", background: "#060f1d",
        display: "flex", alignItems: "center", justifyContent: "center",
        color: "#64748b", fontFamily: "'DM Sans', sans-serif",
      }}>Carregando...</div>
    );
  }

  return (
    <div style={{
      minHeight: "100vh", background: "#060f1d",
      fontFamily: "'DM Sans', sans-serif", maxWidth: 480,
      margin: "0 auto", position: "relative",
    }}>
      <Header count={records.length} onExport={handleExport} view={view} setView={setView} />

      {view === "form" && (
        <div style={{ padding: 16 }}>
          <PhotoCapture photo={photo} setPhoto={setPhoto} />
          <SelectField label="Tipo de Equipamento" value={type} onChange={(v) => { setType(v); if (v !== "Desktop" && v !== "") { setMonitorCount(""); setMonitorSizes([]); setKeyboardBrand(""); setKeyboardType(""); setMouseBrand(""); setMouseType(""); } if (v !== "Desktop" && v !== "" && v !== "Impressora") { setIp(""); } }} options={EQUIPMENT_TYPES} />
          {(type === "Desktop" || type === "") && (
            <div style={{ marginBottom: 14 }}>
              <label style={labelStyle}>Quantos Monitores?</label>
              <select value={monitorCount} onChange={(e) => handleMonitorCount(e.target.value)} style={inputStyle}>
                <option value="">Selecione...</option>
                {[0,1,2,3,4].map((n) => <option key={n} value={n}>{n}</option>)}
              </select>
              {monitorSizes.length > 0 && (
                <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
                  {monitorSizes.map((size, i) => (
                    <div key={i}>
                      <label style={{ ...labelStyle, marginBottom: 4 }}>Polegadas - Monitor {i + 1}</label>
                      <select value={size} onChange={(e) => handleMonitorSize(i, e.target.value)} style={inputStyle}>
                        <option value="">Selecione...</option>
                        {["14\"","15.6\"","17\"","18.5\"","19\"","20\"","21.5\"","22\"","23\"","23.8\"","24\"","27\"","29\"","32\"","34\"","Outro"].map((p) => (
                          <option key={p} value={p}>{p}</option>
                        ))}
                      </select>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          <TextField label="Identificação / Nome" value={name} onChange={setName} placeholder="Ex: PC-TI-01, Desktop Recepção..." />
          {(type === "Desktop" || type === "" || type === "Impressora") && (
            <TextField label="IP da Rede" value={ip} onChange={setIp} placeholder="Ex: 192.168.1.100" />
          )}
          {(type === "Desktop" || type === "") && (
            <div style={{
              marginBottom: 14, padding: 12, borderRadius: 12,
              border: "1px solid #1e3a5f", background: "rgba(15,36,64,0.5)",
            }}>
              <label style={{ ...labelStyle, marginBottom: 10, fontSize: 12, color: "#94a3b8" }}>Teclado</label>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Marca</label>
                  <input type="text" value={keyboardBrand} onChange={(e) => setKeyboardBrand(e.target.value)}
                    placeholder="Ex: Logitech, Dell..." style={inputStyle} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Tipo</label>
                  <select value={keyboardType} onChange={(e) => setKeyboardType(e.target.value)} style={inputStyle}>
                    <option value="">Selecione...</option>
                    <option value="Com fio">Com fio</option>
                    <option value="Sem fio">Sem fio</option>
                  </select>
                </div>
              </div>
            </div>
          )}
          {(type === "Desktop" || type === "") && (
            <div style={{
              marginBottom: 14, padding: 12, borderRadius: 12,
              border: "1px solid #1e3a5f", background: "rgba(15,36,64,0.5)",
            }}>
              <label style={{ ...labelStyle, marginBottom: 10, fontSize: 12, color: "#94a3b8" }}>Mouse</label>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Marca</label>
                  <input type="text" value={mouseBrand} onChange={(e) => setMouseBrand(e.target.value)}
                    placeholder="Ex: Logitech, Dell..." style={inputStyle} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Tipo</label>
                  <select value={mouseType} onChange={(e) => setMouseType(e.target.value)} style={inputStyle}>
                    <option value="">Selecione...</option>
                    <option value="Com fio">Com fio</option>
                    <option value="Sem fio">Sem fio</option>
                  </select>
                </div>
              </div>
            </div>
          )}
          <SelectField label="Setor" value={sector} onChange={setSector} options={SECTORS} required />
          <TextField label="Colaborador Vinculado" value={employee} onChange={setEmployee} placeholder="Nome do colaborador" />
          <TextArea label="Observações" value={obs} onChange={setObs} placeholder="Detalhes adicionais, patrimônio, modelo..." />
          <button onClick={handleSave} style={{
            width: "100%", padding: "14px", borderRadius: 12,
            border: "none", background: "linear-gradient(135deg, #f59e0b, #d97706)",
            color: "#0b1a2e", fontSize: 16, fontWeight: 700,
            fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
            marginTop: 6, boxShadow: "0 4px 20px rgba(245,158,11,0.25)",
          }}>Salvar Registro</button>
        </div>
      )}

      {view === "list" && (
        <div style={{ padding: 16 }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
              placeholder="Buscar..." style={{ ...inputStyle, flex: 1 }} />
            <select value={filterSector} onChange={(e) => setFilterSector(e.target.value)}
              style={{ ...inputStyle, width: "auto", maxWidth: 140, fontSize: 12 }}>
              <option value="">Todos setores</option>
              {SECTORS.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 16px", color: "#475569" }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>📋</div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>
                {records.length === 0 ? "Nenhum registro ainda" : "Nenhum resultado"}
              </div>
              <div style={{ fontSize: 13, marginTop: 4 }}>
                {records.length === 0
                  ? "Toque em '+ Novo' para começar o mapeamento"
                  : "Tente outro filtro ou termo de busca"}
              </div>
            </div>
          ) : (
            <>
              <div style={{
                fontFamily: "'IBM Plex Mono', monospace", fontSize: 11,
                color: "#475569", marginBottom: 8,
              }}>{filtered.length} de {records.length} registro{records.length !== 1 ? "s" : ""}</div>
              {filtered.map((r) => (
                <RecordCard key={r.id} rec={r} onDelete={handleDelete} />
              ))}
            </>
          )}
        </div>
      )}

      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
